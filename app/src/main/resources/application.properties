spring.application.name = easy-course-app

# Set the default profile
#spring.profiles.default=h2
spring.profiles.default=mysql-local

server.port=8080

server.address=0.0.0.0

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
spring.liquibase.drop-first=false
liquibase.validate-on-migrate=false

spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


deepseek.api.key=${DEEPSEEK_API_KEY}
deepseek.api.url=https://api.deepseek.com/v1/chat/completions
deepseek.api.model=deepseek-chat

spring.mvc.async.request-timeout=30000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

yandex.gpt.api.key=${YANDEX_GPT_API_KEY}
yandex.gpt.api.url=https://llm.api.cloud.yandex.net/foundationModels/v1/completion
yandex.gpt.api.model-uri=gpt://b1grl0e87ma0oc0sae8c/yandexgpt-lite
yandex.gpt.api.model-uri.batch=gpt://b1grl0e87ma0oc0sae8c/yandexgpt/rc
yandex.gpt.api.model-uri.qwen=gpt://b1grl0e87ma0oc0sae8c/qwen3.6-35b-a3b/latest
yandex.gpt.api.model-uri.gpt-oss-20b=gpt://b1grl0e87ma0oc0sae8c/gpt-oss-20b/latest
yandex.gpt.api.model-uri.deepseek-v4-flash=gpt://b1grl0e87ma0oc0sae8c/deepseek-v4-flash/latest
yandex.gpt.api.folder-id=b1grl0e87ma0oc0sae8c
yandex.gpt.api.ai-studio.url=https://ai.api.cloud.yandex.net/v1

stepik.api.base-url=https://stepik.org/api
stepik.api.token=${STEPIK_API_TOKEN}
stepik.api.owner-id=${STEPIK_API_OWNER_ID}
stepik.api.default-language=ru
stepik.api.default-public=true
stepik.api.default-course-type=basic

stepik.oauth.token-url=https://stepik.org/oauth2/token/

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

stepik.token.aop.enabled=${STEPIK_TOKEN_AOP_ENABLED:false}

recaptcha.site-key=${RECAPTCHA_SITE_KEY}
#recaptcha.site-key=6LdWdMgrAAAAALEfICOugnBGAqjMI-YahsHNBHYF

default.llm.provider = yandex

# CORS Configuration (tuna/ngrok/cloudflared tunnels for local dev)
cors.allowed-origin-pattern=http://localhost:*,https://*.tuna.am,http://*.tuna.am
# cors.allowed-origins=http://localhost:5173,http://localhost:3000
# cors.allow-credentials=true

sectionPool = 10
lessonPool = 25
stepPool = 50

max.tokens.default = 2000
max.tokens.batch = 8000
batch.generation.max-steps=8

subscription.free.ai-limit=40
subscription.free.max-batch-steps=3
subscription.pro.max-batch-steps=8