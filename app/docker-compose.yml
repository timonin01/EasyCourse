services:
  mysql-master:
    image: mariadb:11.4
    container_name: easy-course-mysql-master
    command: --server-id=1 --log-bin --log-basename=mariadb
    environment:
      MARIADB_ROOT_PASSWORD: Lalka123
      MARIADB_DATABASE: easy_course_db
      MARIADB_USER: easy_course_user
      MARIADB_PASSWORD: easy_course_pass
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: repl_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 40s
  mysql-replica-1:
    image: mariadb:11.4
    container_name: easy-course-mysql-replica-1
    command: --server-id=2 --log-basename=mariadb
    environment:
      MARIADB_ROOT_PASSWORD: Lalka123
      MARIADB_MASTER_HOST: mysql-master
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_HEALTHCHECK_GRANTS: REPLICA MONITOR
    ports:
      - "3307:3306"
    volumes:
      - mysql_replica_1_data:/var/lib/mysql
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--replication_io", "--replication_sql", "--replication" ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s

  mysql-replica-2:
    image: mariadb:11.4
    container_name: easy-course-mysql-replica-2
    command: --server-id=3 --log-basename=mariadb
    environment:
      MARIADB_ROOT_PASSWORD: Lalka123
      MARIADB_MASTER_HOST: mysql-master
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: repl_password
      MARIADB_HEALTHCHECK_GRANTS: REPLICA MONITOR
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica_2_data:/var/lib/mysql
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--replication_io", "--replication_sql", "--replication" ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s
  redis-master:
    image: redis:7-alpine
    container_name: easy-course-redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_master_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  redis-replica-1:
    image: redis:7-alpine
    container_name: easy-course-redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    volumes:
      - redis_replica_1_data:/data
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli INFO replication | grep -q 'master_link_status:up'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-replica-2:
    image: redis:7-alpine
    container_name: easy-course-redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    volumes:
      - redis_replica_2_data:/data
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli INFO replication | grep -q 'master_link_status:up'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  easy-course-app-1:
    build: .
    image: easy-course-app:local
    container_name: easy-course-app-1
    env_file:
      - environment.env
    environment:
      SPRING_PROFILES_ACTIVE: mysql-local
      SPRING_DATASOURCE_URL: jdbc:mariadb://mysql-master:3306/easy_course_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Lalka123
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      STEPIK_TOKEN_AOP_ENABLED: "true"
      CORS_ALLOWED_ORIGIN_PATTERN: "http://localhost:*,https://*.tuna.am,http://*.tuna.am"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replica-1:
        condition: service_healthy
      mysql-replica-2:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: unless-stopped

  easy-course-app-2:
    image: easy-course-app:local
    container_name: easy-course-app-2
    env_file:
      - environment.env
    environment:
      SPRING_PROFILES_ACTIVE: mysql-local
      SPRING_DATASOURCE_URL: jdbc:mariadb://mysql-master:3306/easy_course_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Lalka123
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      STEPIK_TOKEN_AOP_ENABLED: "true"
      CORS_ALLOWED_ORIGIN_PATTERN: "http://localhost:*,https://*.tuna.am,http://*.tuna.am"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-replica-1:
        condition: service_healthy
      mysql-replica-2:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: unless-stopped

  nginx-balancer:
    image: nginx:alpine
    container_name: easy-course-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - easy-course-app-1
      - easy-course-app-2
    restart: unless-stopped

volumes:
  mysql_master_data:
  mysql_replica_1_data:
  mysql_replica_2_data:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
