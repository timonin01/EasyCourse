services:
  mysql:
    image: mysql:8.0
    container_name: easy-course-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Lalka123
      MYSQL_DATABASE: easy_course_db
      MYSQL_USER: easy_course_user
      MYSQL_PASSWORD: easy_course_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  redis-master:
    image: redis:7-alpine
    container_name: easy-course-redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_master_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  redis-replica-1:
    image: redis:7-alpine
    container_name: easy-course-redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    volumes:
      - redis_replica_1_data:/data
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli INFO replication | grep -q 'master_link_status:up'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-replica-2:
    image: redis:7-alpine
    container_name: easy-course-redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    volumes:
      - redis_replica_2_data:/data
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli INFO replication | grep -q 'master_link_status:up'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  easy-course-app-1:
    build: .
    image: easy-course-app:local
    container_name: easy-course-app-1
    env_file:
      - environment.env
    environment:
      SPRING_PROFILES_ACTIVE: mysql-local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/easy_course_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Lalka123
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      STEPIK_TOKEN_AOP_ENABLED: "true"
      CORS_ALLOWED_ORIGIN_PATTERN: "http://localhost:*,https://*.tuna.am,http://*.tuna.am"
    depends_on:
      mysql:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: unless-stopped

  easy-course-app-2:
    image: easy-course-app:local
    container_name: easy-course-app-2
    env_file:
      - environment.env
    environment:
      SPRING_PROFILES_ACTIVE: mysql-local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/easy_course_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Lalka123
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      STEPIK_TOKEN_AOP_ENABLED: "true"
      CORS_ALLOWED_ORIGIN_PATTERN: "http://localhost:*,https://*.tuna.am,http://*.tuna.am"
    depends_on:
      mysql:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    restart: unless-stopped

  nginx-balancer:
    image: nginx:alpine
    container_name: easy-course-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - easy-course-app-1
      - easy-course-app-2
    restart: unless-stopped

volumes:
  mysql_data:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
